<section class="hero-card">
  <div class="hero-top">
    <div class="hero-avatar" aria-hidden="true">FH</div>
    <div class="hero-identity">
      <h1 class="hero-name">{{ name }}</h1>
      <p class="hero-title">{{ title }}</p>
    </div>
  </div>

  <div class="contact-grid">
    <a class="contact-item" href="mailto:{{ email }}">
      <span class="contact-icon" aria-hidden="true">✉</span>
      <span class="contact-label">{{ email }}</span>
    </a>

    <a class="contact-item" href="tel:{{ phone }}">
      <span class="contact-icon" aria-hidden="true">📞</span>
      <span class="contact-label">{{ phone }}</span>
    </a>

    <div class="contact-item">
      <span class="contact-icon" aria-hidden="true">📍</span>
      <span class="contact-label">{{ location }}</span>
    </div>

    <a class="contact-item"
       href="https://wa.me/{{ whatsapp }}"
       target="_blank"
       rel="noopener noreferrer">
      <span class="contact-icon" aria-hidden="true">💬</span>
      <span class="contact-label">WhatsApp {{ whatsapp }}</span>
    </a>

    <a class="contact-item"
       href="https://www.linkedin.com/in/{{ linkedin }}"
       target="_blank"
       rel="noopener noreferrer">
      <span class="contact-icon" aria-hidden="true">🔗</span>
      <span class="contact-label">linkedin.com/in/{{ linkedin }}</span>
    </a>

    <div class="contact-item">
      <span class="contact-icon" aria-hidden="true">🏠</span>
      <span class="contact-label">Work Permit: {{ workPermit }}</span>
    </div>

    <div class="contact-item">
      <span class="contact-icon" aria-hidden="true">🗓</span>
      <span class="contact-label">DOB: {{ dob }}</span>
    </div>
  </div>
</section>
